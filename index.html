<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
            color: #222;
        }
        h1 { margin: 0 0 1rem; }
        #status {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            min-height: 1.5em;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(3, 96px);
            grid-template-rows: repeat(3, 96px);
            gap: 6px;
            background: #333;
            padding: 6px;
            border-radius: 8px;
        }
        [data-cell] {
            font-family: inherit;
            font-size: 3rem;
            font-weight: 700;
            background: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
            color: #222;
        }
        [data-cell]:hover:not(:disabled) { background: #eef; }
        [data-cell]:disabled { cursor: not-allowed; }
        #reset {
            margin-top: 1.5rem;
            padding: 0.5rem 1.25rem;
            font-size: 1rem;
            background: #222;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #reset:hover { background: #444; }
    </style>
</head>
<body>
    <h1>Tic-Tac-Toe</h1>
    <div id="status">X's turn</div>
    <div id="board">
        <button data-cell="0" aria-label="cell 0"></button>
        <button data-cell="1" aria-label="cell 1"></button>
        <button data-cell="2" aria-label="cell 2"></button>
        <button data-cell="3" aria-label="cell 3"></button>
        <button data-cell="4" aria-label="cell 4"></button>
        <button data-cell="5" aria-label="cell 5"></button>
        <button data-cell="6" aria-label="cell 6"></button>
        <button data-cell="7" aria-label="cell 7"></button>
        <button data-cell="8" aria-label="cell 8"></button>
    </div>
    <button id="reset">Reset</button>

    <script>
        (function () {
            'use strict';

            const WINNING_LINES = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // cols
                [0, 4, 8], [2, 4, 6]             // diagonals
            ];

            const cells = Array.from(document.querySelectorAll('[data-cell]'))
                .sort((a, b) => Number(a.dataset.cell) - Number(b.dataset.cell));
            const statusEl = document.getElementById('status');
            const resetEl = document.getElementById('reset');

            let board;       // array of 9: '', 'X', or 'O'
            let currentPlayer;
            let gameOver;

            function checkWinner(b) {
                for (const [a, c, d] of WINNING_LINES) {
                    if (b[a] && b[a] === b[c] && b[a] === b[d]) {
                        return b[a];
                    }
                }
                return null;
            }

            function isDraw(b) {
                return b.every(v => v !== '');
            }

            function render() {
                for (let i = 0; i < 9; i++) {
                    cells[i].textContent = board[i];
                    cells[i].disabled = gameOver || board[i] !== '';
                }
            }

            function handleClick(i) {
                if (gameOver || board[i] !== '') return;
                board[i] = currentPlayer;

                const winner = checkWinner(board);
                if (winner) {
                    gameOver = true;
                    statusEl.textContent = winner + ' wins!';
                } else if (isDraw(board)) {
                    gameOver = true;
                    statusEl.textContent = "It's a draw";
                } else {
                    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                    statusEl.textContent = currentPlayer + "'s turn";
                }
                render();
            }

            function reset() {
                board = ['', '', '', '', '', '', '', '', ''];
                currentPlayer = 'X';
                gameOver = false;
                statusEl.textContent = "X's turn";
                render();
            }

            cells.forEach((cell, i) => {
                cell.addEventListener('click', () => handleClick(i));
            });
            resetEl.addEventListener('click', reset);

            reset();
        })();
    </script>
</body>
</html>
